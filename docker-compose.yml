services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"

  api:
    build: .
    container_name: api
    depends_on:
      - mysql
    ports:
      - "5000:5000"

  ngix:
    image: nginx:alpine
    container_name: ngix
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
