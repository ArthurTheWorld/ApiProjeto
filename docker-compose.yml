version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"

  api:
    build: .
    container_name: api
    depends_on:
      - mysql
    ports:
      - "5000:5000"